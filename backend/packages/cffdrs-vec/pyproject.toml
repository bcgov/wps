[project]
name = "cffdrs-vec"
version = "0.1.0"
description = "Numba-vectorized wrappers for cffdrs FWI and FBP functions"
authors = [{ name = "BC Wildfire Service", email = "BCWS.Predictive.Services@gov.bc.ca" }]
requires-python = ">=3.12.3,<4.0"
dependencies = [
    "cffdrs>=0,<1",
    "numba>=0,<1",
    "numpy>=1,<3",
]

[project.optional-dependencies]
dev = [
    "gdal==3.13.1",
]

[tool.uv.sources]
cffdrs = { git = "https://github.com/cffdrs/cffdrs_py.git", rev = "b52b27686f236b15d002ff49df85cd828a398ff2" }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/cffdrs_vec"]
