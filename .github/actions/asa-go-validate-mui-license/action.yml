name: Validate ASA Go MUI License
description: Verify the MUI X Pro license key is present and valid

inputs:
  mui-license-key:
    description: MUI X Pro license key
    required: true

runs:
  using: composite
  steps:
    - name: Validate MUI License
      working-directory: ./mobile/asa-go
      shell: bash
      env:
        VITE_MUI_LICENSE_KEY: ${{ inputs.mui-license-key }}
      run: |
        node - <<'NODE'
          const { dirname, join } = require('path');
          const { readFileSync } = require('fs');
          const { verifyLicense } = require('@mui/x-license/internals');
          const { version } = require('@mui/x-data-grid-pro/package.json');
          const releaseDate = readFileSync(join(dirname(require.resolve('@mui/x-data-grid-pro/DataGridPro')), 'DataGridPro.js'), 'utf8')
            .match(/releaseDate:\s*"([^"]+)"/)?.[1];

          if (!releaseDate) {
            console.error('Unable to find MUI X Data Grid Pro release date');
            process.exit(1);
          }
          
          const result = verifyLicense({
            licenseKey: process.env.VITE_MUI_LICENSE_KEY,
            packageInfo: {
              name: 'x-data-grid-pro',
              version,
              releaseDate,
            },
          });
          console.log('MUI license status:', result.status);
          if (result.status !== 'Valid') { console.error('MUI license check failed'); process.exit(1); }
        NODE
