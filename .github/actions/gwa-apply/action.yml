name: GWA Apply
description: Apply APS resources (DraftDataset, Product, etc.) with gwa. Requires ./.github/actions/gwa-setup to have run earlier in the job.

inputs:
  gateway-id:
    description: APS gateway id
    required: true
  client-id:
    description: APS service account client id
    required: true
  client-secret:
    description: APS service account client secret
    required: true
  files:
    description: Newline-separated list of resource files to apply with gwa apply -i
    required: true
  host:
    description: APS host (api.gov.bc.ca for production, api-gov-bc-ca.test.api.gov.bc.ca for the test portal)
    required: true

runs:
  using: composite
  steps:
    - name: Apply APS resources
      shell: bash
      env:
        GATEWAY_ID: ${{ inputs.gateway-id }}
        GWA_CLIENT_ID: ${{ inputs.client-id }}
        GWA_CLIENT_SECRET: ${{ inputs.client-secret }}
        FILES: ${{ inputs.files }}
        HOST: ${{ inputs.host }}
      run: |
        set -euo pipefail

        gwa config set host "${HOST}"
        gwa config set --gateway "${GATEWAY_ID}"
        gwa login \
          --client-id="${GWA_CLIENT_ID}" \
          --client-secret="${GWA_CLIENT_SECRET}"

        while IFS= read -r file; do
          if [ -n "${file}" ]; then
            gwa apply -i "${file}"
          fi
        done <<< "${FILES}"
