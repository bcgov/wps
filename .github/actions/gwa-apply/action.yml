name: GWA Apply
description: Install gwa, authenticate, and apply APS resources (DraftDataset, Product, etc.)

inputs:
  gateway-id:
    description: APS gateway id
    required: true
  client-id:
    description: APS service account client id
    required: true
  client-secret:
    description: APS service account client secret
    required: true
  files:
    description: Newline-separated list of resource files to apply with gwa apply -i
    required: true
  host:
    description: APS host override (set to api-gov-bc-ca.test.api.gov.bc.ca for the test portal)
    required: false
    default: ''

runs:
  using: composite
  steps:
    - name: Install GWA CLI
      shell: bash
      run: |
        set -euo pipefail
        GWA_BIN_DIR="${RUNNER_TEMP}/gwa-bin"
        mkdir -p "${GWA_BIN_DIR}"
        curl -L "https://github.com/bcgov/gwa-cli/releases/download/v3.0.7/gwa_Linux_x86_64.tgz" \
          | tar -zxf - -C "${GWA_BIN_DIR}"
        echo "${GWA_BIN_DIR}" >> "${GITHUB_PATH}"

    - name: Apply APS resources
      shell: bash
      env:
        GATEWAY_ID: ${{ inputs.gateway-id }}
        GWA_CLIENT_ID: ${{ inputs.client-id }}
        GWA_CLIENT_SECRET: ${{ inputs.client-secret }}
        FILES: ${{ inputs.files }}
        HOST: ${{ inputs.host }}
      run: |
        set -euo pipefail

        if [ -n "${HOST}" ]; then
          gwa config set host "${HOST}"
        fi
        gwa config set --gateway "${GATEWAY_ID}"
        gwa login \
          --client-id="${GWA_CLIENT_ID}" \
          --client-secret="${GWA_CLIENT_SECRET}"

        while IFS= read -r file; do
          [ -n "${file}" ] && gwa apply -i "${file}"
        done <<< "${FILES}"
