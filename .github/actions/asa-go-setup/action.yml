name: ASA Go Setup
description: Install Node.js and frontend workspace dependencies for asa-go builds

runs:
  using: composite
  steps:
    - name: Setup Node.js environment
      uses: actions/setup-node@v6
      with:
        node-version: "20"

    - uses: actions/cache@v5
      id: yarn-cache
      with:
        path: "**/node_modules"
        key: ${{ runner.os }}-modules-${{ hashFiles('**/yarn.lock') }}

    - name: Enable corepack
      shell: bash
      run: corepack enable

    - name: Use Yarn Berry
      shell: bash
      run: yarn set version berry

    - name: Install dependencies
      working-directory: ./frontend
      shell: bash
      run: yarn install --immutable
