name: ASA Go

permissions:
  contents: read

on:
  pull_request:
    branches:
      - main
    paths:
      - "mobile/**"

jobs:
  js_test:
    runs-on: ubuntu-22.04
    strategy:
      matrix:
        node-version: [20.x]
    name: Test JS
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup ASA Go
        uses: ./.github/actions/asa-go-setup
      - name: Test with Coverage
        working-directory: ./mobile/asa-go
        run: yarn run test:ci
      - name: Upload test coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          token: ${{secrets.CODECOV_TOKEN}}
          files: ./mobile/asa-go/coverage/lcov.info
          flags: asa_go
          name: asa-go-coverage
          # we want to ensure code coverage is good, so we fail on error. (default is false)
          fail_ci_if_error: true

  ios_test:
    runs-on: macos-latest
    name: Test iOS
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup ASA Go
        uses: ./.github/actions/asa-go-setup
      - name: Sync Capacitor iOS
        working-directory: ./mobile/asa-go
        run: yarn cap sync ios
      - name: Use Xcode latest stable
        uses: maxim-lobanov/setup-xcode@60606e260d2fc5762a71e64e74b2174e8ea3c8bd
        with:
          xcode-version: latest-stable
      - name: Test Keycloak Swift Plugin
        working-directory: ./mobile/keycloak
        run: |
          xcodebuild test \
            -scheme "Keycloak" \
            -destination "platform=iOS Simulator,name=iPhone 16 Pro" \
            -enableCodeCoverage YES \
            -resultBundlePath ${{ runner.temp }}/keycloak.xcresult
      - name: Upload iOS coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ${{ runner.temp }}/keycloak.xcresult
          flags: keycloak_ios
          fail_ci_if_error: true

  android_test:
    runs-on: ubuntu-22.04
    name: Test Android
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup ASA Go
        uses: ./.github/actions/asa-go-setup
      - name: Sync Capacitor Android
        working-directory: ./mobile/asa-go
        run: yarn cap sync android
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@0723195856401067f7a2779048b490ace7a47d7c # v5.0.2
      - name: Test ASA Go Android
        working-directory: ./mobile/asa-go/android
        run: ./gradlew testDebugUnitTestCoverage
      - name: Test Keycloak Android plugin
        working-directory: ./mobile/keycloak/android
        run: ./gradlew testDebugUnitTestCoverage
      - name: Upload Android coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: |
            ./mobile/asa-go/android/app/build/reports/coverage/test/debug/report.xml
            ./mobile/keycloak/android/build/reports/coverage/test/debug/report.xml
          flags: android
          fail_ci_if_error: true
