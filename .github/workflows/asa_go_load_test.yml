name: ASA Go Load Test

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  load_test:
    runs-on: ubuntu-24.04
    name: Run k6 load test against psu.api.gov.bc.ca
    timeout-minutes: 25
    defaults:
      run:
        working-directory: backend/packages/wps-api/load-tests/asa-go

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install k6
        uses: grafana/setup-k6-action@v1
        with:
          k6-version: 2.0.0

      - name: Pre-flight — verify X-Forwarded-For rate limit buckets are independent
        run: |
          R1=$(curl -sf -o /dev/null -D - \
            -H "X-Forwarded-For: 127.0.0.2" \
            https://psu.api.gov.bc.ca/api/asa-go/sfms-run-bounds \
            | grep -i "x-ratelimit-remaining-minute:" | awk '{print $2}' | tr -d '\r')
          R2=$(curl -sf -o /dev/null -D - \
            -H "X-Forwarded-For: 127.0.0.3" \
            https://psu.api.gov.bc.ca/api/asa-go/sfms-run-bounds \
            | grep -i "x-ratelimit-remaining-minute:" | awk '{print $2}' | tr -d '\r')
          echo "X-RateLimit-Remaining-Minute: 127.0.0.2=$R1  127.0.0.3=$R2"
          if [ -z "$R1" ] || [ -z "$R2" ]; then
            echo "FAIL: X-RateLimit-Remaining-Minute header missing — Kong may not be returning rate limit headers"
            exit 1
          fi
          if [ "$R1" != "$R2" ]; then
            echo "FAIL: buckets are NOT independent (shared bucket detected — Kong is rate-limiting by real source IP, not X-Forwarded-For)"
            echo "The saturation scenario will be capped at 100 req/min total. Aborting."
            exit 1
          fi
          echo "PASS: rate limit buckets are independent per X-Forwarded-For IP"

      - name: Set up IP aliases
        run: ./setup_ips.sh

      - name: Run load test
        run: k6 run --local-ips 127.0.0.2-127.0.0.21 --out json=results.json load_test.js

      - name: Tear down IP aliases
        if: always()
        run: ./teardown_ips.sh

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: k6-results
          path: backend/packages/wps-api/load-tests/asa-go/results.json
          retention-days: 30
