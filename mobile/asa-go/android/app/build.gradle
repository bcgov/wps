apply plugin: 'com.android.application'
apply plugin: 'jacoco'

android {
    namespace "ca.bc.gov.asago"
    compileSdk rootProject.ext.compileSdkVersion

    buildFeatures {
        buildConfig true
    }

    flavorDimensions "env"

    defaultConfig {
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        versionCode System.getenv("VERSION_CODE") ? System.getenv("VERSION_CODE").toInteger() : 7
        versionName System.getenv("VERSION_NAME") ?: "1.0"
        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
        aaptOptions {
             // Files and dirs to omit from the packaged assets dir, modified to accommodate modern web apps.
             // Default: https://android.googlesource.com/platform/frameworks/base/+/282e181b58cf72b6ca770dc7ca5f91f135444502/tools/aapt/AaptAssets.cpp#61
            ignoreAssetsPattern '!.svn:!.git:!.ds_store:!*.scc:.*:!CVS:!thumbs.db:!picasa.ini:!*~'
        }
        manifestPlaceholders = [
            appAuthRedirectScheme: "ca.bc.gov.asago",
            appAuthManagementActivity: "ca.bc.gov.asago.MainActivity"
        ]
        buildConfigField "String", "APP_AUTH_REDIRECT_SCHEME", "\"ca.bc.gov.asago\""
    }
    productFlavors {
        dev {
            dimension "env"
            applicationId "ca.bc.gov.asago.dev"
            resValue "string", "app_name", "ASA Go Dev"
            resValue "string", "title_activity_main", "ASA Go Dev"
            resValue "string", "custom_url_scheme", "ca.bc.gov.asago"
        }
        prod {
            dimension "env"
            applicationId "ca.bc.gov.asago"
            resValue "string", "app_name", "ASA Go"
            resValue "string", "title_activity_main", "ASA Go"
            resValue "string", "custom_url_scheme", "ca.bc.gov.asago"
        }
    }
    signingConfigs {
        release {
            storeFile = file("release.keystore")
            keyAlias System.getenv("ANDROID_KEY_ALIAS")
            storePassword System.getenv("ANDROID_SIGNING_STORE_PASSWORD")
            keyPassword System.getenv("ANDROID_SIGNING_KEY_PASSWORD")
        }
    }
    buildTypes {
        debug {
        }
        release {
            signingConfig signingConfigs.release
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android.txt'), 'proguard-rules.pro'
        }
    }
}

repositories {
    flatDir{
        dirs '../capacitor-cordova-android-plugins/src/main/libs', 'libs'
    }
}

dependencies {
    implementation fileTree(include: ['*.jar'], dir: 'libs')
    implementation "androidx.appcompat:appcompat:$androidxAppCompatVersion"
    implementation "androidx.coordinatorlayout:coordinatorlayout:$androidxCoordinatorLayoutVersion"
    implementation "androidx.core:core-splashscreen:$coreSplashScreenVersion"
    implementation project(':capacitor-android')
    
    // AppAuth library for OAuth handling
    implementation 'net.openid:appauth:0.11.1'
    
    testImplementation "junit:junit:$junitVersion"
    testImplementation 'org.mockito:mockito-core:5.23.0'
    testImplementation 'org.mockito:mockito-inline:5.2.0'
    testImplementation 'org.robolectric:robolectric:4.16.1'
    testImplementation 'androidx.test:core:1.7.0'
    androidTestImplementation "androidx.test.ext:junit:$androidxJunitVersion"
    androidTestImplementation "androidx.test.espresso:espresso-core:$androidxEspressoCoreVersion"
    implementation project(':capacitor-cordova-android-plugins')
    // Import the Firebase BoM
    implementation platform('com.google.firebase:firebase-bom:34.11.0')
}

apply from: 'capacitor.build.gradle'

tasks.withType(Test) {
    jacoco.includeNoLocationClasses = true
    jacoco.excludes = ['jdk.internal.*']
}

task jacocoTestReport(type: JacocoReport, dependsOn: ['testProdDebugUnitTest']) {
    reports {
        xml.required = true
        html.required = false
    }
    def fileFilter = ['**/R.class', '**/R$*.class', '**/BuildConfig.*', '**/Manifest*.*', '**/*Test*.*', 'android/**/*.*']
    def debugTree = fileTree(dir: "${buildDir}/intermediates/javac/prodDebug/compileProdDebugJavaWithJavac/classes", excludes: fileFilter)
    sourceDirectories.setFrom(files(["${project.projectDir}/src/main/java"]))
    classDirectories.setFrom(files([debugTree]))
    executionData.setFrom(fileTree(dir: "$buildDir", includes: ["jacoco/testProdDebugUnitTest.exec"]))
}

try {
    def googleServicesFiles = [
        file('src/dev/google-services.json'),
        file('src/prod/google-services.json')
    ]
    if (googleServicesFiles.any { it.exists() && it.text.trim() }) {
        apply plugin: 'com.google.gms.google-services'
    }
} catch(Exception e) {
    logger.info("google-services.json not found, google-services plugin not applied. Push Notifications won't work")
}
