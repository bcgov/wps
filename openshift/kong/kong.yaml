_format_version: "1.1"

services:
  - name: wps-fba-public
    host: wps-api-prod.e1e498-prod.svc
    tags: [ns.${GWA_NAMESPACE}]
    port: 8080
    protocol: http
    retries: 0

routes:
  - name: wps-fba-public-route
    tags: [ns.${GWA_NAMESPACE}]
    service: wps-fba-public
    hosts:
      - api.psu.nrs.gov.bc.ca
    methods: [GET]
    paths:
      - ~/api/fba/
    strip_path: false

plugins:
  - name: rate-limiting
    tags: [ns.${GWA_NAMESPACE}]
    config:
      fault_tolerant: true
      hide_client_headers: false
      limit_by: ip
      minute: 60
      hour: 1000
      policy: local
