apiVersion: template.openshift.io/v1
kind: Template
metadata:
  name: ${APP_NAME}-sfms-fwi-api
  annotations:
    openshift.io/display-name: "wps sfms-fwi api"
    description: "Wildfire Predictive Services - SFMS Daily FWI API"
    openshift.io/long-description: "Wildfire Predictive Services - SFMS Daily FWI API. Internal service exposed only through the APS gateway."
    tags: "wps,sfms-fwi"
    iconClass: icon-js
    openshift.io/provider-display-name: "Government of British Columbia"
    openshift.io/documentation-url: "https://github.com/bcgov/wps"
    openshift.io/support-url: "https://github.com/bcgov/wps"
labels:
  app.kubernetes.io/part-of: "${APP_NAME}-sfms-fwi-api"
  app: ${APP_NAME}-${SUFFIX}-sfms-fwi
parameters:
  - name: APP_NAME
    description: Application name
    value: wps
  - name: GLOBAL_NAME
    description: Name of global module
    value: wps-global
  - name: CRUNCHYDB_USER
    description: Name of crunchydb user details key
    required: true
  - name: POSTGRES_DATABASE
    description: Postgres DB name
    required: true
  - name: SUFFIX
    description: Deployment suffix, e.g. pr-### or prod
    required: true
  - name: PROJ_TOOLS
    value: e1e498-tools
  - name: CPU_REQUEST
    description: Requested CPU
    value: 100m
  - name: MEMORY_REQUEST
    description: Requested memory
    value: 512Mi
  - name: MEMORY_LIMIT
    description: Memory upper limit
    value: 1Gi
  - name: REPLICAS
    description: Number of replicas
    value: "2"
  - name: IMAGE_REGISTRY
    description: Location where images are pulled from
    value: image-registry.openshift-image-registry.svc:5000
    required: true
  - name: ENVIRONMENT
    description: Used for specifying which environment sentry is running in
    value: ""
  - name: GUNICORN_WORKERS
    description: Number of gunicorn workers
    value: "2"
  - name: DEPLOY_VERSION
    description: Changes to force a single rollout after image builds complete
    required: true
objects:
  - apiVersion: apps/v1
    kind: Deployment
    metadata:
      labels:
        app: ${APP_NAME}-${SUFFIX}-sfms-fwi
      name: ${APP_NAME}-${SUFFIX}-sfms-fwi
    spec:
      replicas: ${{REPLICAS}}
      selector:
        matchLabels:
          name: ${APP_NAME}-${SUFFIX}-sfms-fwi
      strategy:
        type: RollingUpdate
      template:
        metadata:
          labels:
            name: ${APP_NAME}-${SUFFIX}-sfms-fwi
          annotations:
            # changes once per deploy so the pod template rolls one time
            wps/deploy-version: ${DEPLOY_VERSION}
        spec:
          automountServiceAccountToken: false
          containers:
            - image: ${IMAGE_REGISTRY}/${PROJ_TOOLS}/${APP_NAME}-api-${SUFFIX}:${SUFFIX}
              imagePullPolicy: Always
              name: ${APP_NAME}-sfms-fwi-api
              env:
                - name: APP_MODULE
                  value: app.sfms_fwi_main:app
                - name: POSTGRES_READ_USER
                  valueFrom:
                    secretKeyRef:
                      name: ${CRUNCHYDB_USER}
                      key: user
                - name: POSTGRES_WRITE_USER
                  valueFrom:
                    secretKeyRef:
                      name: ${CRUNCHYDB_USER}
                      key: user
                - name: POSTGRES_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: ${CRUNCHYDB_USER}
                      key: password
                - name: POSTGRES_WRITE_HOST
                  valueFrom:
                    secretKeyRef:
                      name: ${CRUNCHYDB_USER}
                      key: pgbouncer-host
                - name: POSTGRES_READ_HOST
                  valueFrom:
                    secretKeyRef:
                      name: ${CRUNCHYDB_USER}
                      key: pgbouncer-host
                - name: POSTGRES_PORT
                  valueFrom:
                    secretKeyRef:
                      name: ${CRUNCHYDB_USER}
                      key: pgbouncer-port
                - name: POSTGRES_DATABASE
                  value: ${POSTGRES_DATABASE}
                - name: PORT
                  value: "8080"
                - name: ENVIRONMENT
                  value: ${ENVIRONMENT}
                - name: GUNICORN_WORKERS
                  value: ${GUNICORN_WORKERS}
                - name: OBJECT_STORE_SERVER
                  valueFrom:
                    secretKeyRef:
                      name: ${GLOBAL_NAME}
                      key: object-store-server
                - name: OBJECT_STORE_USER_ID
                  valueFrom:
                    secretKeyRef:
                      name: ${GLOBAL_NAME}
                      key: object-store-user-id
                - name: OBJECT_STORE_SECRET
                  valueFrom:
                    secretKeyRef:
                      name: ${GLOBAL_NAME}
                      key: object-store-secret
                - name: OBJECT_STORE_BUCKET
                  valueFrom:
                    secretKeyRef:
                      name: ${GLOBAL_NAME}
                      key: object-store-bucket
                - name: SENTRY_DSN
                  valueFrom:
                    secretKeyRef:
                      name: ${GLOBAL_NAME}
                      key: sentry-dsn
              ports:
                - containerPort: 8080
                  protocol: TCP
              resources:
                limits:
                  memory: ${MEMORY_LIMIT}
                requests:
                  cpu: ${CPU_REQUEST}
                  memory: ${MEMORY_REQUEST}
              startupProbe:
                httpGet:
                  path: /api/ready
                  port: 8080
                  scheme: HTTP
                initialDelaySeconds: 5
                periodSeconds: 5
                failureThreshold: 20
                timeoutSeconds: 2
              readinessProbe:
                httpGet:
                  path: /api/ready
                  port: 8080
                  scheme: HTTP
                initialDelaySeconds: 5
                periodSeconds: 2
                failureThreshold: 20
                timeoutSeconds: 2
              livenessProbe:
                successThreshold: 1
                failureThreshold: 3
                httpGet:
                  path: /api/health
                  port: 8080
                  scheme: HTTP
                initialDelaySeconds: 15
                periodSeconds: 30
                timeoutSeconds: 5
  - apiVersion: v1
    kind: Service
    metadata:
      labels:
        app: ${APP_NAME}-${SUFFIX}-sfms-fwi
      name: ${APP_NAME}-sfms-fwi-api-${SUFFIX}
    spec:
      ports:
        - name: 8080-tcp
          protocol: TCP
          port: 80
          targetPort: 8080
      selector:
        name: ${APP_NAME}-${SUFFIX}-sfms-fwi
