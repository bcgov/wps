apiVersion: template.openshift.io/v1
kind: Template
metadata:
  name: allow-gateway-to-wps-api
objects:
  - apiVersion: networking.k8s.io/v1
    kind: NetworkPolicy
    metadata:
      name: allow-gateway-to-${APP_NAME}-api-${SUFFIX}
      labels:
        app: ${APP_NAME}-${SUFFIX}
    spec:
      policyTypes:
        - Ingress
      podSelector:
        matchLabels:
          name: ${APP_NAME}-${SUFFIX}
      ingress:
        - from:
            - namespaceSelector:
                matchLabels:
                  environment: test
                  name: 264e6f
                  # Silver APS gateway namespace
                  # https://developer.gov.bc.ca/docs/default/component/aps-infra-platform-docs/how-to/upstream-services/#network-policies
          ports:
            - protocol: TCP
              port: 8080
        - from:
            - namespaceSelector:
                matchLabels:
                  environment: prod
                  name: 264e6f
          ports:
            - protocol: TCP
              port: 8080
parameters:
  - name: APP_NAME
    required: true
  - name: SUFFIX
    required: true
