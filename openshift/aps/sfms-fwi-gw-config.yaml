# https://developer.gov.bc.ca/docs/default/component/aps-infra-platform-docs/concepts/gateway-config/
# https://developer.konghq.com/gateway/entities/service/
services:
  # Uses kong format so it can be published with `gwa publish-gateway --qualifier`.
  # Qualifiers allow one gateway to hold multiple independent config sets without pruning
  # other service configs.
  - name: ${FWI_SERVICE_NAME}
    tags: [ns.${APS_NAMESPACE}.fwi-${SUFFIX}]
    host: wps-sfms-fwi-api-${SUFFIX}.${PROJECT_NAMESPACE}.svc
    port: 80
    protocol: http
    routes:
      - name: ${FWI_SERVICE_NAME}
        tags: [ns.${APS_NAMESPACE}.fwi-${SUFFIX}]
        hosts:
          - ${FWI_HOST}
        paths:
          - /api/sfms/daily-fwi
        strip_path: false
    plugins:
      # Require a valid API key issued through the APS portal.
      # Consumers register at https://api.gov.bc.ca to receive a key.
      - name: key-auth
        tags: [ns.${APS_NAMESPACE}.fwi-${SUFFIX}]
        config:
          key_names:
            - X-API-Key
          # Strip the key before forwarding to the upstream so credentials
          # are not logged or exposed in backend access logs.
          hide_credentials: true
      # Rate-limit per registered consumer so one key cannot monopolise the service.
      - name: rate-limiting
        tags: [ns.${APS_NAMESPACE}.fwi-${SUFFIX}]
        config:
          policy: local
          limit_by: consumer
          minute: 60
          second: null
          hour: null
          day: null
          month: null
          year: null
          fault_tolerant: true
          hide_client_headers: false
