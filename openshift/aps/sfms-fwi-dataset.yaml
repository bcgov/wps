title: SFMS Daily Fire Weather Index API${DISPLAY_SUFFIX}
notes: |
  The SFMS Daily Fire Weather Index (FWI) API provides daily fire weather index values
  calculated by the Wildfire Predictive Services Unit (PSU) using the Canadian Forest
  Fire Weather Index System (CFFDRS).

  FWI values represent the fire danger rating for a given day and location, derived from
  temperature, relative humidity, wind speed, and 24-hour precipitation observations at
  BC weather stations.

  Visit the [WPS API specification](https://psu.nrs.gov.bc.ca/api/docs) for endpoint
  details and [Canada’s Fire Weather Index System page](https://natural-resources.canada.ca/forests-forestry/wildland-fires/canada-fire-weather-index-system)
  for background on how FWI is used operationally.

  Access requires an API key issued through the API Services Portal.
